{% extends "master.html" %}

{% block title %}
  Add Company
{% endblock %}

{% block content %}
  <h1>
    Add Company
    <button type="submit" form="add-form">Save</button>
    <a href="/companies/">
      <button type="button">Cancel</button>
    </a>
  </h1>
  <form id="add-form" method="post" action="/companies/">
    {% csrf_token %}
    {{ form.as_p }}
  </form>
{% endblock %}
