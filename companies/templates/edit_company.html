{% extends "master.html" %}

{% block title %}
  Edit Company
{% endblock %}

{% block content %}
  <h1>
    Edit Company: {{ item.id }} ({{ item.name }})
    <button type="submit" form="edit-form">Save</button>
    <a href="/companies/{{ item.id }}">
      <button type="button">Cancel</button>
    </a>
  </h1>
  <form id="edit-form" method="post" action="/companies/{{ item.id }}">
    {% csrf_token %}
    {{ form.as_p }}
  </form>
{% endblock %}
