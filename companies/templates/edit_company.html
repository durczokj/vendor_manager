{% extends "master.html" %}

{% block title %}
  Edit Company
{% endblock %}

{% block content %}
  <h1>
    Edit Company: {{ company.id }} ({{ company.name }})
    <button type="submit" form="edit-form">Save</button>
    <a href="/companies/{{ company.id }}">
      <button type="button">Cancel</button>
    </a>
  </h1>
  <form id="edit-form" method="post" action="/companies/{{ company.id }}">
    {% csrf_token %}
    {{ form.as_p }}
  </form>
{% endblock %}
