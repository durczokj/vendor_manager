{% extends "master.html" %}

{% block title %}
  Add Order
{% endblock %}

{% block content %}
  <h1>
    Add Order
    <button type="submit" form="add-form">Save</button>
    <a href="{% url 'orders' %}">
      <button type="button">Cancel</button>
    </a>
  </h1>
  <form id="add-form" method="post" action="{% url 'orders' %}">
    {% csrf_token %}
    {{ form.as_p }}
  </form>
{% endblock %}
