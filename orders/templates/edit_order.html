{% extends "master.html" %}
{% load static %}

{% block title %}
  Edit Company
{% endblock %}

{% block content %}
  <h1>
    Edit Order: {{ item.id }} ({{ item.name }})
    <button type="submit" form="edit-form">Save</button>
    <a href="{% url 'order' item.id %}">
      <button type="button">Cancel</button>
    </a>
  </h1>
  <form id="edit-form" method="post" action="{% url 'order' item.id %}">
    {% csrf_token %}
    {{ form.as_p }}
  </form>
{% endblock %}
