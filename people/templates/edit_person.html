{% extends "master.html" %}

{% block title %}
  Edit Person
{% endblock %}

{% block content %}
  <h1>
    Edit Person: {{ item.id }} ({{ item.first_name }} {{ item.last_name }})
    <button type="submit" form="edit-form">Save</button>
    <a href="/people/{{ item.id }}/">
      <button type="button">Cancel</button>
    </a>
  </h1>
  <form id="edit-form" method="post" action="/people/{{ item.id }}/">
    {% csrf_token %}
    {{ form.as_p }}
  </form>
{% endblock %}
