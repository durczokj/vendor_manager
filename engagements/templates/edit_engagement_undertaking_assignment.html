{% extends "master.html" %}

{% block title %}
  Edit Engagement-Order Version Assignment
{% endblock %}

{% block content %}
  <h1>
    Edit Engagement-Undertaking Version Assignment: {{ item.id }}
    <button type="submit" form="edit-form">Save</button>
    <a href="{% url 'engagement_undertaking_assignment' item.id %}">
      <button type="button">Cancel</button>
    </a>
  </h1>
  <form id="edit-form" method="post" action="{% url 'engagement_undertaking_assignment' item.id %}">
    {% csrf_token %}
    {{ form.as_p }}
  </form>
{% endblock %}
