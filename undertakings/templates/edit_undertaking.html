{% extends "master.html" %}

{% block title %}
  Edit Undertaking
{% endblock %}

{% block content %}
  <h1>
    Edit Undertaking: {{ undertaking.id }} ({{ undertaking.name }})
    <button type="submit" form="edit-form">Save</button>
    <a href="/undertakings/{{ undertaking.id }}">
      <button type="button">Cancel</button>
    </a>
  </h1>
  <form id="edit-form" method="post" action="/undertakings/{{ undertaking.id }}">
    {% csrf_token %}
    {{ form.as_p }}
  </form>
{% endblock %}
